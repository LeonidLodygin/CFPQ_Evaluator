name: CI

on:
  push:
    branches: [main, master, dev]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Tests / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run Ruff
        run: python -m ruff check .

      - name: Check Black formatting
        run: python -m black --check .

      - name: Run tests with coverage
        run: |
          python -m coverage run -m pytest
          python -m coverage report
          python -m coverage xml

      - name: Check CLI plan example
        run: |
          cfpq-eval plan \
            --datasets examples/tiny/datasets_bundle.csv \
            --solvers examples/tiny/solvers.toml

      - name: Run tiny example
        run: |
          cfpq-eval run \
            --datasets examples/tiny/datasets_bundle.csv \
            --solvers examples/tiny/solvers.toml \
            --out /tmp/cfpq-evaluator-results \
            --rounds 1 \
            --timeout 10 \
            --mtx-base one \
            --force

      - name: Show tiny summary
        run: cat /tmp/cfpq-evaluator-results/summary.md
